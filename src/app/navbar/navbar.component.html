<div class="example-container" [class.example-is-mobile]="isMobile()">
  <mat-toolbar class="example-toolbar">
    <button matIconButton (click)="snav.toggle()"><mat-icon>menu</mat-icon></button>
    <h1 class="example-app-name">Angular Material</h1>
    <span class="example-spacer"></span>
    <button
      matIconButton
      class="example-icon favorite-icon"
      (click)="onThemeChange()"
      aria-label="Example icon-button with heart icon"
    >
      <mat-icon>light_mode</mat-icon>
    </button>
    <button
      matIconButton
      class="example-icon"
      (click)="onThemeChange()"
      aria-label="Example icon-button with share icon"
    >
      <mat-icon>dark_mode</mat-icon>
    </button>
  </mat-toolbar>
  <mat-sidenav-container
    class="example-sidenav-container"
    [style.marginTop.px]="isMobile() ? 56 : 0"
  >
    <mat-sidenav
      #snav
      [opened]="!isMobile()"
      [mode]="isMobile() ? 'over' : 'side'"
      [fixedInViewport]="isMobile()"
      fixedTopGap="56"
    >
      <mat-nav-list>
        <a mat-list-item href="#dashboard">Dashboard</a>
        <a mat-list-item href="#btntest">Mat Button</a>
        <a mat-list-item href="#address-form">Address Form</a>
      </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
      <ng-content></ng-content>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
