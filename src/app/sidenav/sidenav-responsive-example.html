<mat-toolbar color="primary" class="top-toolbar">Header</mat-toolbar>

<mat-sidenav-container class="example-container" [hasBackdrop]="hasBackdrop.value">
  <mat-sidenav
    #sidenav
    [mode]="mode.value"
    opened
    class="example-sidenav"
    [fixedInViewport]="options.value.fixed"
    [fixedTopGap]="options.value.top"
    [fixedBottomGap]="options.value.bottom"
  >
    {{ options.value.fixed ? 'Fixed' : 'Non-fixed' }} Sidenav
  </mat-sidenav>

  <mat-sidenav-content [formGroup]="options" style="background: lightblue">
    <p><mat-checkbox formControlName="fixed">Fixed</mat-checkbox></p>
    <p>
      <mat-form-field>
        <mat-label>Top gap</mat-label>
        <input matInput type="number" formControlName="top" />
      </mat-form-field>
    </p>
    <p>
      <mat-form-field>
        <mat-label>Bottom gap</mat-label>
        <input matInput type="number" formControlName="bottom" />
      </mat-form-field>
    </p>
    <p><button mat-raised-button color="primary" (click)="sidenav.toggle()">Toggle</button></p>
      <mat-form-field>
        <mat-label>Sidenav mode</mat-label>
        <mat-select #mode value="side">
          <mat-option value="side">Side</mat-option>
          <mat-option value="over">Over</mat-option>
          <mat-option value="push">Push</mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field style="padding-left: 20px">
        <mat-label>Has backdrop</mat-label>
        <mat-select #hasBackdrop>
          <mat-option>Unset</mat-option>
          <mat-option [value]="true">True</mat-option>
          <mat-option [value]="false">False</mat-option>
        </mat-select>
      </mat-form-field>
  </mat-sidenav-content>
</mat-sidenav-container>

<mat-toolbar color="primary" class="bottom-toolbar">Footer</mat-toolbar>
