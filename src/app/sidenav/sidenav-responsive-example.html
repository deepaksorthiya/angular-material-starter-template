<div class="example-container" [class.example-is-mobile]="isMobile()">
  <mat-toolbar [color]="toolbarColor" class="example-toolbar">
    <button mat-icon-button (click)="snav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>

    <h1 class="example-app-name title">Application Console</h1>

    <span class="example-spacer"></span>
    <button mat-icon-button aria-label="Example search icon">
      <mat-icon>search</mat-icon>
    </button>
    <button
      mat-icon-button
      (click)="onThemeChange()"
      aria-label="Example icon-button with theme icon"
    >
      <mat-icon>{{ isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <div class="desktop-menu">
      <button mat-icon-button aria-label="show 4 new mails">
        <mat-icon
          [matBadge]="4"
          [attr.aria-hidden]="false"
          aria-hidden="false"
          matBadgeColor="accent"
          >mail</mat-icon
        >
      </button>
      <button mat-icon-button aria-label="show 17 new notifications">
        <mat-icon
          [matBadge]="17"
          [attr.aria-hidden]="false"
          aria-hidden="false"
          matBadgeColor="warn"
          >notifications</mat-icon
        >
      </button>
      <button
        mat-icon-button
        [matMenuTriggerFor]="profileMenu"
        aria-label="account of current user"
      >
        <mat-icon>account_circle</mat-icon>
      </button>
    </div>

    <div class="mobile-menu">
      <button mat-icon-button [matMenuTriggerFor]="mobileMenu" aria-label="show more">
        <mat-icon>more_vert</mat-icon>
      </button>
    </div>
  </mat-toolbar>
  <mat-menu #profileMenu="matMenu">
    <button mat-menu-item><mat-icon>person</mat-icon><span>Profile</span></button>
    <button mat-menu-item><mat-icon>settings_account_box</mat-icon><span>Settings</span></button>
    <button mat-menu-item><mat-icon>dashboard</mat-icon><span>Dashboard</span></button>
    <button mat-menu-item><mat-icon>logout</mat-icon><span>Logout</span></button>
  </mat-menu>

  <mat-menu #mobileMenu="matMenu">
    <button mat-menu-item>
      <mat-icon [matBadge]="4" [attr.aria-hidden]="false" aria-hidden="false" matBadgeColor="warn"
        >mail</mat-icon
      >
      <span>Messages</span>
    </button>
    <button mat-menu-item>
      <mat-icon [matBadge]="17" [attr.aria-hidden]="false" aria-hidden="false" matBadgeColor="warn"
        >notifications</mat-icon
      >
      <span>Notifications</span>
    </button>
    <button mat-menu-item [matMenuTriggerFor]="profileMenu">
      <mat-icon>account_circle</mat-icon>
      <span>Profile</span>
    </button>
  </mat-menu>
  <mat-sidenav-container
    class="example-sidenav-container"
    [style.marginTop.px]="isMobile() ? 56 : 0"
  >
    <mat-sidenav
      #snav
      [opened]="!isMobile()"
      [mode]="isMobile() ? 'over' : 'side'"
      [fixedInViewport]="isMobile()"
      fixedTopGap="56"
    >
      <mat-nav-list>
        @for (nav of fillerNav; track nav) {
          <a mat-list-item routerLink=".">{{ nav }}</a>
        }
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <main class="main-container">
        @for (content of fillerContent; track content) {
          <p>{{ content }}</p>
        }
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
