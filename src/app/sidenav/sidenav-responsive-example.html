<div class="example-container" [class.example-is-mobile]="isMobile()">
  <mat-toolbar [color]="toolbarColor" class="example-toolbar">
    <button mat-icon-button (click)="snav.toggle()"><mat-icon>menu</mat-icon></button>
    <h1 class="example-app-name">Responsive App</h1>
    <span class="example-spacer"></span>
    <button mat-icon-button class="example-icon favorite-icon" (click)="onThemeChange()"
      aria-label="Example icon-button with heart icon">
      <mat-icon>{{ isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
  </mat-toolbar>

  <mat-sidenav-container class="example-sidenav-container" [style.marginTop.px]="isMobile() ? 56 : 0">
    <mat-sidenav #snav [opened]="!isMobile()" [mode]="isMobile() ? 'over' : 'side'" [fixedInViewport]="isMobile()"
      fixedTopGap="56">
      <mat-nav-list>
        @for (nav of fillerNav; track nav) {
        <a mat-list-item routerLink=".">{{nav}}</a>
        }
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <main class="main-container">
        @for (content of fillerContent; track content) {
        <p>{{content}}</p>
        }
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
